<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام المحكمة العليا السحابي</title>
<style>
    body {background:#111;color:white;text-align:center;font-family:Arial;margin:0;padding:0;}
    header {background:black;color:gold;padding:15px;font-size:28px;font-weight:bold;border-bottom: 2px solid gold;}
    button {margin:5px;padding:10px 18px;border:2px solid gold;background:#222;color:gold;border-radius:10px;cursor:pointer;transition: 0.3s;}
    button:hover {background:gold; color:black;}
    table {width:95%;margin:20px auto;border-collapse:collapse; background:#1a1a1a;}
    th,td {border:1px solid gold;padding:10px;text-align:center;}
    th {background: #333; color: gold;}
    #hackMsg {display:none;position:fixed;top:10%;left:50%;transform:translateX(-50%);
            background:rgba(255,0,0,0.8);color:white;font-size:25px;padding:20px;
            border:3px solid red;border-radius:15px;z-index:9999;text-align:center;box-shadow: 0 0 20px red;}
    input {padding:10px; margin:5px; border-radius:5px; border:1px solid gold; background:#222; color:white; width: 80%; max-width: 300px;}
    #nav {padding: 10px; background: #000;}
</style>
</head>
<body>

<header>المحكمة العليا</header>
<div id="hackMsg">⚠️ تنبيه: النظام تحت سيطرة GHOST ⚠️</div>

<div id="auth">
  <div id="loginBox">
    <h3>تسجيل دخول</h3>
    <input id="logName" placeholder="اسم المستخدم"><br>
    <input id="logPass" type="password" placeholder="كلمة السر"><br>
    <button onclick="loginUser()">دخول</button>
    <button onclick="showReg()">إنشاء حساب جديد</button>
  </div>
  <div id="regBox" style="display:none">
    <h3>إنشاء حساب جديد</h3>
    <input id="regName" placeholder="اختر اسماً"><br>
    <input id="regPass" type="password" placeholder="اختر كلمة سر"><br>
    <button onclick="registerUser()">إنشاء</button>
    <button onclick="showLogin()">رجوع</button>
  </div>
</div>

<div id="nav" style="display:none">
  <button onclick="checkAccess('cases')">القضايا</button>
  <button onclick="checkAccess('wanted')">المطلوبين</button>
  <button onclick="checkAccess('emp')">الموظفين</button>
  <button onclick="checkAccess('budget')">الميزانية</button>
  <button onclick="logout()">خروج</button>
</div>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
// 🔑 استبدل هذه البيانات ببيانات مشروعك في Firebase
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const accessCodes = { cases: "c1", wanted: "w1", emp: "e1", budget: "b1" };
let currentUser = null;

// --- 1. تحديث حالة الاختراق للجميع ---
db.collection("settings").doc("systemStatus").onSnapshot((doc) => {
    const data = doc.data();
    const msg = document.getElementById("hackMsg");
    if (data && data.isHacked) { msg.style.display = "block"; } 
    else { msg.style.display = "none"; }
});

async function setHackStatus(status) {
    try { await db.collection("settings").doc("systemStatus").set({ isHacked: status }, { merge: true }); } catch(e){}
}

// --- 2. إدارة المستخدمين ---
async function loginUser(){
  let n = document.getElementById("logName").value.trim();
  let p = document.getElementById("logPass").value.trim();
  if(!n||!p) return alert("يرجى ملء الحقول");

  if(n.toLowerCase()=="ghost" && p=="rt_hacker"){
    currentUser = {name:"ghost", role:"Hacker"};
    await setHackStatus(true);
    showMain();
    return;
  }

  let q = await db.collection("users").where("name","==",n).where("pass","==",p).get();
  if(q.empty){ alert("البيانات خاطئة"); return; }
  q.forEach(doc=>{ currentUser = { id:doc.id, ...doc.data() }; });
  showMain();
}

async function registerUser(){
  let n = document.getElementById("regName").value.trim();
  let p = document.getElementById("regPass").value.trim();
  if(!n||!p) return alert("يرجى ملء الحقول");
  let chk = await db.collection("users").where("name","==",n).get();
  if(!chk.empty) return alert("هذا الاسم موجود بالفعل");
  await db.collection("users").add({name:n, pass:p, role:"مستخدم"});
  alert("تم التسجيل بنجاح");
  showLogin();
}

// --- 3. نظام الحماية بالرموز ---
function checkAccess(type) {
    let code = prompt("أدخل رمز الدخول لهذه النافذة:");
    if (code === accessCodes[type]) {
        if (type === 'cases') showCases();
        if (type === 'wanted') showWanted();
        if (type === 'emp') showEmp();
        if (type === 'budget') showBudget();
    } else { alert("رمز خاطئ!"); }
}

// --- 4. عرض البيانات (حفظ وتزامن للجميع) ---

// القضايا
function showCases(){
  document.getElementById("app").innerHTML="<h3>نظام القضايا</h3><button onclick='addCase()'>إضافة قضية</button><table id='casesTbl'></table>";
  db.collection("cases").onSnapshot(snap => {
    let html = "<tr><th>الرقم</th><th>الاسم</th><th>حذف</th></tr>";
    snap.forEach(doc => {
      let c = doc.data();
      html += `<tr><td>${c.num}</td><td>${c.name}</td><td><button onclick="db.collection('cases').doc('${doc.id}').delete()">حذف</button></td></tr>`;
    });
    document.getElementById("casesTbl").innerHTML = html;
  });
}
function addCase(){
  let num = prompt("رقم القضية:"); let name = prompt("اسم القضية:");
  if(num && name) db.collection("cases").add({num, name});
}

// المطلوبين
function showWanted(){
  document.getElementById("app").innerHTML="<h3>قائمة المطلوبين</h3><button onclick='addWanted()'>إضافة مطلوب</button><table id='wantedTbl'></table>";
  db.collection("wanted").onSnapshot(snap => {
    let html = "<tr><th>الاسم</th><th>الجريمة</th><th>حذف</th></tr>";
    snap.forEach(doc => {
      let w = doc.data();
      html += `<tr><td>${w.name}</td><td>${w.crime}</td><td><button onclick="db.collection('wanted').doc('${doc.id}').delete()">حذف</button></td></tr>`;
    });
    document.getElementById("wantedTbl").innerHTML = html;
  });
}
function addWanted(){
  let n=prompt("اسم الشخص:"); let c=prompt("الجريمة:");
  if(n && c) db.collection("wanted").add({name:n, crime:c});
}

// الميزانية
function showBudget(){
  document.getElementById("app").innerHTML="<h3>الميزانية العامة</h3><button onclick='addB()'>إضافة مبلغ</button><table id='budgetTbl'></table>";
  db.collection("budget").onSnapshot(snap => {
    let html = "<tr><th>البيان</th><th>المبلغ</th><th>حذف</th></tr>";
    snap.forEach(doc => {
      let b = doc.data();
      html += `<tr><td>${b.type}</td><td>${b.value}</td><td><button onclick="db.collection('budget').doc('${doc.id}').delete()">حذف</button></td></tr>`;
    });
    document.getElementById("budgetTbl").innerHTML = html;
  });
}
function addB(){
  let t=prompt("بيان الصرف:"); let v=prompt("المبلغ:");
  if(t && v) db.collection("budget").add({type:t, value:v});
}

// الموظفين
function showEmp(){
  document.getElementById("app").innerHTML="<h3>سجل الموظفين</h3><table id='empTbl'></table>";
  db.collection("users").onSnapshot(snap => {
    let html = "<tr><th>الاسم</th><th>الرتبة</th><th>حذف</th></tr>";
    snap.forEach(doc => {
      let u = doc.data();
      html += `<tr><td>${u.name}</td><td>${u.role}</td><td><button onclick="db.collection('users').doc('${doc.id}').delete()">فصل</button></td></tr>`;
    });
    document.getElementById("empTbl").innerHTML = html;
  });
}

// خروج
async function logout(){
  if (currentUser && currentUser.role === "Hacker") { await setHackStatus(false); }
  currentUser=null;
  document.getElementById("nav").style.display="none";
  document.getElementById("auth").style.display="block";
  document.getElementById("app").innerHTML="";
}

function showReg(){ document.getElementById("loginBox").style.display="none"; document.getElementById("regBox").style.display="block"; }
function showLogin(){ document.getElementById("regBox").style.display="none"; document.getElementById("loginBox").style.display="block"; }
function showMain(){ document.getElementById("auth").style.display="none"; document.getElementById("nav").style.display="block"; }
</script>
</body>
</html>
