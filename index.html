<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وزارة العدل - المحكمة العليا</title>
<style>
body {margin:0;font-family:'Segoe UI',Tahoma,Verdana,sans-serif;background:linear-gradient(135deg,#0a0a0a,#111);color:#fff;text-align:center;}
.header{padding:30px;background:linear-gradient(to right,#222,#000);box-shadow:0 0 30px gold;position:relative;}
.header h1{font-size:48px;color:gold;margin:0 0 10px;text-shadow:2px 2px 15px #000;}
.header img{width:140px;filter:drop-shadow(0 0 25px gold);animation: glow 2s infinite alternate;}
@keyframes glow{from{filter:drop-shadow(0 0 20px gold);}to{filter:drop-shadow(0 0 40px gold);}}
.nav {display:flex;justify-content:center;gap:15px;margin:20px;}
.nav button{background:#222;border:2px solid gold;color:gold;padding:12px 25px;border-radius:12px;cursor:pointer;transition:all 0.4s;}
.nav button:hover{background:gold;color:#222;transform:scale(1.1);}
.page {display:none;margin-top:20px;}
table{margin:20px auto;border-collapse:collapse;width:95%;max-width:1400px;box-shadow:0 0 25px gold;}
table,th,td{border:2px solid gold;}
th{padding:12px;background:#111;color:gold;font-size:18px;}
td{padding:10px;background:#1a1a1a;font-size:16px;}
td.open{background:#0a3;} td.inprogress{background:#fa0;} td.closed{background:#f22;}
#authBox{display:none;margin-top:10px;}
#authBox input{padding:8px;font-size:16px;border-radius:8px;border:2px solid gold;width:200px;text-align:center;}
#authBox button{margin-left:5px;padding:8px 15px;border-radius:8px;border:2px solid gold;background:#222;color:gold;cursor:pointer;}
#authBox button:hover{background:gold;color:#222;}
#message{margin-top:10px;font-size:16px;color:#ffcc00;text-shadow:1px 1px 2px #000;}
</style>
</head>
<body>

<div class="header">
  <h1>وزارة العدل - المحكمة العليا</h1>
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Justice_Scale_icon.svg/1024px-Justice_Scale_icon.svg.png" alt="رمز العدل">
</div>

<div class="nav">
  <button onclick="showPage('casesPage')">القضايا</button>
  <button onclick="showPage('wantedPage')">المطلوبين</button>
  <button onclick="showPage('employeesPage')">الموظفين</button>
  <button onclick="showPage('budgetPage')">الميزانية والعتاد</button>
</div>

<div id="authBox">
  <input type="password" id="authCode" placeholder="أدخل الرمز">
  <button onclick="checkAuth()">دخول</button>
</div>
<div id="message"></div>

<!-- صفحة القضايا -->
<div id="casesPage" class="page">
  <h2>صفحة القضايا</h2>
  <button onclick="showAuth('قضية')">إضافة قضية</button>
  <button onclick="showAuth('حذف قضية')">حذف قضية</button>
  <table id="casesTable"><thead><tr><th>رقم القضية</th><th>الاسم</th><th>المحامي الموكل</th><th>الحالة</th><th>وقت الاستلام</th></tr></thead><tbody></tbody></table>
</div>

<!-- صفحة المطلوبين -->
<div id="wantedPage" class="page">
  <h2>صفحة المطلوبين</h2>
  <button onclick="showAuth('المطلوبين')">إضافة مطلوب</button>
  <table id="wantedTable"><thead><tr><th>الاسم</th><th>رقم الهوية</th><th>الحالة</th></tr></thead><tbody></tbody></table>
</div>

<!-- صفحة الموظفين -->
<div id="employeesPage" class="page">
  <h2>صفحة الموظفين</h2>
  <button onclick="showAuth('قاضي')">إضافة قاضي</button>
  <button onclick="showAuth('نائب قاضي')">إضافة نائب قاضي</button>
  <button onclick="showAuth('محامي')">إضافة محامي</button>
  <button onclick="showAuth('أمين سر')">إضافة أمين سر</button>
  <button onclick="showAuth('حذف موظف')">حذف موظف</button>
  <table id="usersTable"><thead><tr><th>الرتبة</th><th>الاسم</th></tr></thead><tbody></tbody></table>
</div>

<!-- صفحة الميزانية والعتاد -->
<div id="budgetPage" class="page">
  <h2>صفحة الميزانية والعتاد</h2>
  <button onclick="showAuth('ميزانية/عتاد')">إضافة ميزانية أو عتاد</button>
  <table id="budgetTable"><thead><tr><th>القضية</th><th>الميزانية</th><th>المعدات</th></tr></thead><tbody></tbody></table>
</div>

<script>
let currentRole='', users=[], cases=[], wanted=[], equipment=[];
const roleCodes={
  'قاضي':'qswaefrd',
  'نائب قاضي':'0797979',
  'محامي':'mhm',
  'أمين سر':'sr',
  'قضية':'q',
  'حذف قضية':'delq',
  'حذف موظف':'delu',
  'المطلوبين':'wt1',
  'ميزانية/عتاد':'budget1'
};

function showPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById(pageId).style.display='block';
  renderCases(); renderUsers(); renderWanted(); renderBudget();
}

function showAuth(role){
  currentRole=role;
  document.getElementById('authBox').style.display='block';
  document.getElementById('message').textContent='';
}

function checkAuth(){
  const code=document.getElementById('authCode').value;
  if(code===roleCodes[currentRole]){
    document.getElementById('message').textContent='تم الدخول بنجاح كـ '+currentRole;
    document.getElementById('authBox').style.display='none';
    handleRole(currentRole);
  }else{
    document.getElementById('message').textContent='رمز غير صحيح!';
  }
}

function handleRole(role){
  if(role==='قاضي'||role==='نائب قاضي'||role==='أمين سر'||role==='محامي'){
    let name=prompt('ادخل الاسم');
    if(name) users.push({role,name});
    renderUsers();
  }
  if(role==='حذف موظف'){
    let name=prompt('ادخل اسم الموظف المراد حذفه');
    users=users.filter(u=>u.name!==name);
    renderUsers();
  }
  if(role==='قضية'){
    let caseNum=prompt('ادخل رقم القضية'),
        name=prompt('ادخل اسم الموكّل'),
        lawyer=prompt('ادخل اسم المحامي الموكل'),
        budget=prompt('ادخل الميزانية'),
        now=new Date().toLocaleString();
    cases.push({caseNum,name,lawyer,status:'open',time:now,budget});
    renderCases(); renderBudget();
  }
  if(role==='حذف قضية'){
    let caseNum=prompt('ادخل رقم القضية لحذفها');
    cases=cases.filter(c=>c.caseNum!==caseNum);
    renderCases(); renderBudget();
  }
  if(role==='المطلوبين'){
    let name=prompt('ادخل اسم المطلوب'),
        id=prompt('ادخل رقم الهوية'),
        status=prompt('ادخل الحالة');
    wanted.push({name,id,status});
    renderWanted();
  }
  if(role==='ميزانية/عتاد'){
    // فقط القاضي ونائبه يمكنهم إضافة
    let caseNum=prompt('ادخل رقم القضية لإضافة الميزانية/العتاد');
    let name=prompt('ادخل اسم العتاد/المعدات');
    let budget=prompt('ادخل الميزانية للقضية');
    if(caseNum && name && budget){
      let c = cases.find(x=>x.caseNum===caseNum);
      if(c){c.budget=budget;}
      equipment.push({caseNum,name});
      renderBudget();
    }
  }
}

function renderUsers(){
  let tbody=document.getElementById('usersTable').querySelector('tbody');
  tbody.innerHTML='';
  users.forEach(u=>{
    let tr=document.createElement('tr');
    tr.innerHTML=`<td>${u.role}</td><td>${u.name}</td>`;
    tbody.appendChild(tr);
  });
}

function renderCases(){
  let tbody=document.getElementById('casesTable').querySelector('tbody');
  tbody.innerHTML='';
  cases.forEach(c=>{
    let tr=document.createElement('tr');
    tr.innerHTML=`<td>${c.caseNum}</td><td>${c.name}</td><td>${c.lawyer}</td>
                   <td class="${c.status}"><button onclick="updateCaseStatus('${c.caseNum}')">${c.status}</button></td>
                   <td>${c.time}</td>`;
    tbody.appendChild(tr);
  });
}

function renderWanted(){
  let tbody=document.getElementById('wantedTable').querySelector('tbody');
  tbody.innerHTML='';
  wanted.forEach(w=>{
    let tr=document.createElement('tr');
    tr.innerHTML=`<td>${w.name}</td><td>${w.id}</td><td>${w.status}</td>`;
    tbody.appendChild(tr);
  });
}

function renderBudget(){
  let tbody=document.getElementById('budgetTable').querySelector('tbody');
  tbody.innerHTML='';
  cases.forEach(c=>{
    let equipList = equipment.filter(e=>e.caseNum===c.caseNum).map(e=>e.name).join(', ');
    let tr=document.createElement('tr');
    tr.innerHTML=`<td>${c.caseNum}</td><td>${c.budget}</td><td>${equipList}</td>`;
    tbody.appendChild(tr);
  });
}

function updateCaseStatus(caseNum){
  let c=cases.find(x=>x.caseNum===caseNum); if(!c) return;
  let newStatus=prompt('أدخل الحالة الجديدة (open / inprogress / closed)',c.status);
  if(newStatus){c.status=newStatus; renderCases();}
}

showPage('casesPage');
</script>

</body>
</html>
