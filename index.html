<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحكمة العليا</title>
    <style>
        body {background:#111;color:white;text-align:center;font-family:Arial, sans-serif;margin:0;padding:0;}
        header {background:black;color:gold;padding:15px;font-size:28px;font-weight:bold;border-bottom: 2px solid gold;}
        button {margin:5px;padding:10px 18px;border:2px solid gold;background:#222;color:gold;border-radius:10px;cursor:pointer;transition: 0.3s;}
        button:hover {background: gold; color: black;}
        input {padding: 8px; margin: 5px; border-radius: 5px; border: 1px solid gold; background: #333; color: white;}
        table {width:95%;margin:20px auto;border-collapse:collapse;}
        th,td {border:1px solid gold;padding:8px;text-align:center;}
        #hackMsg {display:none;position:fixed;top:10%;left:50%;transform:translateX(-50%);
                background:rgba(0,0,0,0.8);color:red;font-size:28px;padding:20px;
                border:3px solid red;border-radius:15px;z-index:999;text-align:center;}
    </style>
</head>
<body>

<header>نظام المحكمة العليا</header>
<div id="hackMsg">⚠️ تم اختراق النظام ⚠️</div>

<div id="auth">
  <div id="loginBox">
    <h3>تسجيل دخول</h3>
    <input id="logName" placeholder="اسم المستخدم"><br>
    <input id="logPass" type="password" placeholder="كلمة السر"><br>
    <button onclick="loginUser()">دخول</button>
    <button onclick="showReg()">إنشاء حساب</button>
  </div>

  <div id="regBox" style="display:none">
    <h3>إنشاء حساب جديد</h3>
    <input id="regName" placeholder="اسم المستخدم"><br>
    <input id="regPass" type="password" placeholder="كلمة السر"><br>
    <button onclick="registerUser()">إنشاء</button>
    <button onclick="showLogin()">رجوع</button>
  </div>
</div>

<div id="nav" style="display:none">
  <button onclick="showCases()">القضايا</button>
  <button onclick="showWanted()">المطلوبين</button>
  <button onclick="showEmp()">الموظفين</button>
  <button onclick="showBudget()">الميزانية</button>
  <button onclick="logout()">خروج</button>
</div>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
// 🔑 إعدادات Firebase
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

// تهيئة Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;

// عناصر الواجهة
const authDiv = document.getElementById("auth");
const navDiv = document.getElementById("nav");
const appDiv = document.getElementById("app");
const loginBox = document.getElementById("loginBox");
const regBox = document.getElementById("regBox");

// تبديل الواجهات
function showReg(){ loginBox.style.display="none"; regBox.style.display="block"; }
function showLogin(){ regBox.style.display="none"; loginBox.style.display="block"; }
function showMain(){ authDiv.style.display="none"; navDiv.style.display="block"; }

// تسجيل دخول
async function loginUser(){
  let n = document.getElementById("logName").value.trim();
  let p = document.getElementById("logPass").value.trim();
  if(!n || !p) return alert("الرجاء إدخال البيانات");

  // نظام الهاكر "Easter Egg"
  if(n.toLowerCase()=="ghost" && p=="rt_hacker"){
    currentUser = {name:"ghost", role:"Hacker"};
    startHackMsg();
    showMain();
    alert("تم تفعيل وضع المخترق");
    return;
  }

  try {
    let q = await db.collection("users").where("name","==",n).where("pass","==",p).get();
    if(q.empty){ alert("خطأ في اسم المستخدم أو كلمة السر"); return; }
    q.forEach(doc => { currentUser = { id:doc.id, ...doc.data() }; });
    showMain();
    alert("مرحباً بك: " + currentUser.name);
  } catch(e) { alert("حدث خطأ في الاتصال"); }
}

// إنشاء حساب
async function registerUser(){
  let n = document.getElementById("regName").value.trim();
  let p = document.getElementById("regPass").value.trim();
  if(!n || !p) return alert("املأ البيانات");

  let chk = await db.collection("users").where("name","==",n).get();
  if(!chk.empty) return alert("هذا الاسم مستخدم مسبقاً");

  await db.collection("users").add({name:n, pass:p, role:"مستخدم"});
  alert("تم إنشاء الحساب بنجاح");
  showLogin();
}

// تأثير الاختراق
function startHackMsg(){
  let msg = document.getElementById("hackMsg");
  function showHide(){ 
    msg.style.display="block"; 
    setTimeout(()=> msg.style.display="none", 5000); 
  }
  showHide();
  setInterval(showHide, 15000);
}

// الرتب
let rankCodes = {q1:"قاضي", n1:"نائب قاضي", m1:"محامي", s1:"أمين سر", rt_Hacker:"هاكر"};

// القضايا
function showCases(){
  appDiv.innerHTML="<h3>إدارة القضايا</h3><button onclick='addCase()'>إضافة قضية جديدة</button><table id='casesTbl'><tr><th>رقم القضية</th><th>الاسم</th><th>الإجراءات</th></tr></table>";
  db.collection("cases").onSnapshot(snapshot=>{
    let tbl = document.getElementById("casesTbl");
    if(!tbl) return;
    tbl.innerHTML = "<tr><th>رقم القضية</th><th>الاسم</th><th>الإجراءات</th></tr>";
    snapshot.forEach(doc=>{
      let c = doc.data();
      let row = tbl.insertRow();
      row.insertCell(0).innerText = c.num;
      row.insertCell(1).innerText = c.name;
      let delBtn = document.createElement("button");
      delBtn.innerText="حذف";
      delBtn.onclick=()=>db.collection("cases").doc(doc.id).delete();
      row.insertCell(2).appendChild(delBtn);
    });
  });
}

function addCase(){
  let num = prompt("أدخل رقم القضية:");
  let name = prompt("أدخل اسم القضية:");
  if(num && name) db.collection("cases").add({num, name});
}

// المطلوبين
function showWanted(){
  appDiv.innerHTML="<h3>قائمة المطلوبين</h3><button onclick='addWanted()'>إضافة مطلوب</button><table id='wantedTbl'><tr><th>الاسم</th><th>الجريمة</th><th>الإجراءات</th></tr></table>";
  db.collection("wanted").onSnapshot(snapshot=>{
    let tbl = document.getElementById("wantedTbl");
    if(!tbl) return;
    tbl.innerHTML = "<tr><th>الاسم</th><th>الجريمة</th><th>الإجراءات</th></tr>";
    snapshot.forEach(doc=>{
      let w = doc.data();
      let row = tbl.insertRow();
      row.insertCell(0).innerText = w.name;
      row.insertCell(1).innerText = w.crime;
      let delBtn = document.createElement("button");
      delBtn.innerText="حذف";
      delBtn.onclick=()=>db.collection("wanted").doc(doc.id).delete();
      row.insertCell(2).appendChild(delBtn);
    });
  });
}

function addWanted(){
  let n=prompt("اسم المطلوب:"), c=prompt("نوع الجريمة:");
  if(n && c) db.collection("wanted").add({name:n, crime:c});
}

// الموظفين والرتب
function showEmp(){
  appDiv.innerHTML="<h3>إدارة الموظفين</h3><button onclick='addEmp()'>إضافة موظف</button><button onclick='setRank()'>تعيين رتبة برمز</button><table id='empTbl'><tr><th>الاسم</th><th>الرتبة</th><th>الإجراءات</th></tr></table>";
  db.collection("users").onSnapshot(snapshot=>{
    let tbl = document.getElementById("empTbl");
    if(!tbl) return;
    tbl.innerHTML="<tr><th>الاسم</th><th>الرتبة</th><th>الإجراءات</th></tr>";
    snapshot.forEach(doc=>{
      let u = doc.data();
      let row = tbl.insertRow();
      row.insertCell(0).innerText = u.name;
      row.insertCell(1).innerText = u.role;
      let delBtn = document.createElement("button");
      delBtn.innerText="حذف موظف";
      delBtn.onclick=()=>db.collection("users").doc(doc.id).delete();
      row.insertCell(2).appendChild(delBtn);
    });
  });
}

async function addEmp(){
  let n=prompt("الاسم:"); let p=prompt("كلمة السر:");
  if(!n || !p) return;
  await db.collection("users").add({name:n, pass:p, role:"مستخدم"});
}

async function setRank(){
  let name = prompt("اسم الموظف لتغيير رتبته:");
  let code = prompt("أدخل رمز الرتبة (مثال: q1, n1, m1):");
  if(!rankCodes[code]) return alert("رمز رتبة غير معروف!");

  let q = await db.collection("users").where("name","==",name).get();
  if(q.empty) return alert("الموظف غير موجود");

  q.forEach(d => db.collection("users").doc(d.id).update({role: rankCodes[code]}));
  alert("تم تحديث الرتبة بنجاح");
}

// الميزانية
function showBudget(){
  appDiv.innerHTML="<h3>السجل المالي</h3><button onclick='addB(\"إيداع\")'>إيداع</button><button onclick='addB(\"سحب\")'>سحب</button><table id='budgetTbl'><tr><th>النوع</th><th>القيمة</th><th>الإجراءات</th></tr></table>";
  db.collection("budget").onSnapshot(snapshot=>{
    let tbl = document.getElementById("budgetTbl");
    if(!tbl) return;
    tbl.innerHTML="<tr><th>النوع</th><th>القيمة</th><th>الإجراءات</th></tr>";
    snapshot.forEach(doc=>{
      let b = doc.data();
      let row = tbl.insertRow();
      row.insertCell(0).innerText = b.type;
      row.insertCell(1).innerText = b.value;
      let delBtn = document.createElement("button");
      delBtn.innerText="حذف";
      delBtn.onclick=()=>db.collection("budget").doc(doc.id).delete();
      row.insertCell(2).appendChild(delBtn);
    });
  });
}

function addB(type){ 
  let v = prompt("المبلغ:"); 
  if(v) db.collection("budget").add({type: type, value: v, date: new Date().toLocaleDateString()}); 
}

// خروج
function logout(){
  currentUser = null;
  navDiv.style.display="none";
  authDiv.style.display="block";
  appDiv.innerHTML="";
  alert("تم تسجيل الخروج");
}
</script>
</body>
</html>
