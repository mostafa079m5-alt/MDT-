<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المحكمة العليا</title>
<style>
body {background:#111;color:white;text-align:center;font-family:Arial;margin:0;padding:0;}
header {background:black;color:gold;padding:15px;font-size:28px;font-weight:bold;}
button {margin:5px;padding:10px 18px;border:2px solid gold;background:#222;color:gold;border-radius:10px;cursor:pointer;}
table {width:95%;margin:10px auto;border-collapse:collapse;}
th,td {border:1px solid gold;padding:8px;text-align:center;}
#hackMsg {display:none;position:fixed;top:10%;left:50%;transform:translateX(-50%);
        background:rgba(0,0,0,0.7);color:red;font-size:28px;padding:20px;
        border:3px solid red;border-radius:15px;z-index:999;text-align:center;}
</style>
</head>
<body>

<header>المحكمة العليا</header>
<div id="hackMsg">⚠️ تم اختراق النظام ⚠️</div>

<div id="auth">
  <div id="loginBox">
    <h3>تسجيل دخول</h3>
    <input id="logName" placeholder="اسم"><br>
    <input id="logPass" type="password" placeholder="كلمة السر"><br>
    <button onclick="loginUser()">دخول</button>
    <button onclick="showReg()">إنشاء حساب</button>
  </div>

  <div id="regBox" style="display:none">
    <h3>إنشاء حساب</h3>
    <input id="regName" placeholder="اسم"><br>
    <input id="regPass" type="password" placeholder="كلمة السر"><br>
    <button onclick="registerUser()">إنشاء</button>
    <button onclick="showLogin()">رجوع</button>
  </div>
</div>

<div id="nav" style="display:none">
  <button onclick="showCases()">القضايا</button>
  <button onclick="showWanted()">المطلوبين</button>
  <button onclick="showEmp()">الموظفين</button>
  <button onclick="showBudget()">الميزانية</button>
  <button onclick="logout()">خروج</button>
</div>

<div id="app"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<script>
// 🔑 ضع مفاتيح Firebase الخاصة بك هنا
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;

// عناصر الواجهة
const loginBox = document.getElementById("loginBox");
const regBox = document.getElementById("regBox");
const auth = document.getElementById("auth");
const nav = document.getElementById("nav");
const app = document.getElementById("app");

// واجهات
function showReg(){ loginBox.style.display="none"; regBox.style.display="block"; }
function showLogin(){ regBox.style.display="none"; loginBox.style.display="block"; }
function showMain(){ auth.style.display="none"; nav.style.display="block"; }

// تسجيل دخول
async function loginUser(){
  let n = document.getElementById("logName").value.trim();
  let p = document.getElementById("logPass").value.trim();
  if(!n||!p) return alert("املأ البيانات");

  if(n.toLowerCase()=="ghost" && p=="rt_hacker"){
    currentUser = {name:"ghost",role:"Hacker"};
    startHackMsg();
    showMain();
    alert("تم تسجيل الدخول كهاكر");
    return;
  }

  let q = await db.collection("users").where("name","==",n).where("pass","==",p).get();
  if(q.empty){ alert("خطأ في البيانات"); return; }
  q.forEach(doc=>{ currentUser = { id:doc.id, ...doc.data() }; });
  showMain();
  alert("تم تسجيل الدخول");
}

// إنشاء حساب
async function registerUser(){
  let n = document.getElementById("regName").value.trim();
  let p = document.getElementById("regPass").value.trim();
  if(!n||!p) return alert("املأ البيانات");

  let chk = await db.collection("users").where("name","==",n).get();
  if(!chk.empty) return alert("الاسم مستخدم");

  await db.collection("users").add({name:n,pass:p,role:"مستخدم"});
  alert("تم إنشاء الحساب، يمكنك الآن تسجيل الدخول");
  showLogin();
}

// رسالة هاكر
function startHackMsg(){
  let msg = document.getElementById("hackMsg");
  function showHide(){ msg.style.display="block"; setTimeout(()=>msg.style.display="none",15000); }
  showHide();
  setInterval(showHide,20000);
}

// رموز الرتب
let rankCodes = {q1:"قاضي",n1:"نائب قاضي",m1:"محامي",s1:"أمين سر",rt_Hacker:"هاكر"};

// القضايا
function showCases(){
  app.innerHTML="<h3>القضايا</h3><button onclick='addCase()'>إضافة قضية</button><table id='casesTbl'><tr><th>رقم</th><th>اسم</th><th>حذف</th></tr></table>";
  db.collection("cases").onSnapshot(snapshot=>{
    let tbl = document.getElementById("casesTbl");
    if(!tbl) return;
    tbl.innerHTML = "<tr><th>رقم</th><th>اسم</th><th>حذف</th></tr>";
    snapshot.forEach(doc=>{
      let c = doc.data();
      let row = tbl.insertRow();
      row.insertCell(0).innerText = c.num;
      row.insertCell(1).innerText = c.name;
      let del = document.createElement("button");
      del.innerText="حذف";
      del.onclick=()=>db.collection("cases").doc(doc.id).delete();
      row.insertCell(2).appendChild(del);
    });
  });
}
function addCase(){
  let num = prompt("رقم"); let name = prompt("اسم");
  if(num && name) db.collection("cases").add({num,name});
}

// المطلوبين
function showWanted(){
  app.innerHTML="<h3>المطلوبين</h3><button onclick='addWanted()'>إضافة</button><table id='wantedTbl'><tr><th>اسم</th><th>جريمة</th><th>حذف</th></tr></table>";
  db.collection("wanted").onSnapshot(snapshot=>{
    let tbl = document.getElementById("wantedTbl");
    if(!tbl) return;
    tbl.innerHTML = "<tr><th>اسم</th><th>جريمة</th><th>حذف</th></tr>";
    snapshot.forEach(doc=>{
      let w = doc.data();
      let row = tbl.insertRow();
      row.insertCell(0).innerText = w.name;
      row.insertCell(1).innerText = w.crime;
      let del = document.createElement("button");
      del.innerText="حذف";
      del.onclick=()=>db.collection("wanted").doc(doc.id).delete();
      row.insertCell(2).appendChild(del);
    });
  });
}
function addWanted(){
  let n=prompt("اسم"),c=prompt("جريمة");
  if(n&&c) db.collection("wanted").add({name:n,crime:c});
}

// الموظفين + رتب
function showEmp(){
  app.innerHTML="<h3>الموظفين</h3><button onclick='addEmp()'>إضافة موظف</button><button onclick='setRank()'>إضافة/تغيير رتبة</button><table id='empTbl'><tr><th>اسم</th><th>رتبة</th><th>حذف</th></tr></table>";
  db.collection("users").onSnapshot(snapshot=>{
    let tbl = document.getElementById("empTbl");
    if(!tbl) return;
    tbl.innerHTML="<tr><th>اسم</th><th>رتبة</th><th>حذف</th></tr>";
    snapshot.forEach(doc=>{
      let u = doc.data();
      let row = tbl.insertRow();
      row.insertCell(0).innerText = u.name;
      row.insertCell(1).innerText = u.role;
      let del = document.createElement("button");
      del.innerText="حذف";
      del.onclick=()=>db.collection("users").doc(doc.id).delete();
      row.insertCell(2).appendChild(del);
    });
  });
}
async function addEmp(){
  let n=prompt("اسم"); let p=prompt("كلمة سر");
  if(!n||!p) return alert("املأ البيانات");
  let chk = await db.collection("users").where("name","==",n).get();
  if(!chk.empty) return alert("الموظف موجود");
  await db.collection("users").add({name:n,pass:p,role:"مستخدم"});
}
async function setRank(){
  let name = prompt("اسم الشخص");
  let code = prompt("رمز الرتبة");
  if(!code) return alert("الرمز مطلوب");
  if(!rankCodes[code]) return alert("رمز غير صحيح");

  let q = await db.collection("users").where("name","==",name).get();
  if(q.empty) return alert("الموظف غير موجود");

  q.forEach(d=>db.collection("users").doc(d.id).update({role: rankCodes[code]}));
}

// الميزانية
function showBudget(){
  app.innerHTML="<h3>الميزانية</h3><button onclick='addB()'>إضافة</button><button onclick='takeB()'>سحب</button><button onclick='gear()'>عتاد</button><table id='budgetTbl'><tr><th>نوع</th><th>قيمة</th><th>حذف</th></tr></table>";
  db.collection("budget").onSnapshot(snapshot=>{
    let tbl = document.getElementById("budgetTbl");
    if(!tbl) return;
    tbl.innerHTML="<tr><th>نوع</th><th>قيمة</th><th>حذف</th></tr>";
    snapshot.forEach(doc=>{
      let b = doc.data();
      let row = tbl.insertRow();
      row.insertCell(0).innerText = b.type;
      row.insertCell(1).innerText = b.value;
      let del = document.createElement("button");
      del.innerText="حذف";
      del.onclick=()=>db.collection("budget").doc(doc.id).delete();
      row.insertCell(2).appendChild(del);
    });
  });
}
function addB(){ let v=prompt("مبلغ"); if(v) db.collection("budget").add({type:"إضافة",value:v}); }
function takeB(){ let v=prompt("مبلغ"); if(v) db.collection("budget").add({type:"سحب",value:v}); }
function gear(){ let v=prompt("عتاد"); if(v) db.collection("budget").add({type:"عتاد",value:v}); }

// خروج
function logout(){
  currentUser=null;
  nav.style.display="none";
  auth.style.display="block";
  app.innerHTML="";
}
</script>
</body>
</html>
